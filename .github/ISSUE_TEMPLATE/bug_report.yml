name: Bug report
description: Report a parsing, build, or runtime defect in ITCHCPP.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search
        [existing issues](https://github.com/bbalouki/itchcpp/issues) first to
        avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >
        Minimal, compilable code (or CLI invocation) that reproduces the
        issue. Attach or link a sample ITCH file if the bug is data-dependent.
      render: cpp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error message, stack trace, or sanitizer output if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ITCHCPP version
      description: Contents of `VERSION.txt`, the pip package version, or the commit SHA.
      placeholder: e.g. 1.6.2
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - C++ library
        - Python bindings (itchcpp)
        - itch-tool CLI
        - Build system / CMake
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      multiple: true
      options:
        - Linux
        - Windows
        - macOS
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler and version
      placeholder: e.g. Clang 18, GCC 13, MSVC 19.38
    validations:
      required: true

  - type: input
    id: cxx-standard
    attributes:
      label: C++ standard
      placeholder: e.g. 20 or 23
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: CMake configure flags, vcpkg/Conan setup, or anything else relevant.
    validations:
      required: false
